# Cargo 依赖源配置（随仓库走）
# 用途：把 crates.io 索引与下载源换成 rsproxy.cn 的 sparse 镜像，
#       解决部分环境连不上 github(crates.io-index) 的问题。
# 要求：cargo >= 1.70（支持 sparse 协议）。目标机 cargo 1.97 满足。
# 如需换回官方源：把下面 replace-with 注释掉即可。

[source.crates-io]
replace-with = "rsproxy-sparse"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

# 用系统 git/curl 走网络（复用系统证书，避免个别 SSL 兼容问题）
[net]
git-fetch-with-cli = true
