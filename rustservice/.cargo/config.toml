# Cargo 依赖源配置（随仓库走）
# 目的：某些环境（如飞牛 NAS 本机）到 github.com 网络不通，
# 默认 crates.io 索引走 github 会报 "failed to fetch crates.io-index / SSL EOF"。
# 这里把索引与下载源都指向国内镜像（sparse 协议，直连 HTTPS，不经过 github）。
# 如需换回官方源，删除本文件即可。

[source.crates-io]
replace-with = "rsproxy-sparse"

[source.rsproxy]
registry = "https://rsproxy.cn/crates.io-index"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[registries.rsproxy]
index = "https://rsproxy.cn/crates.io-index"

# 用系统 git/curl 走网络（比内置 libgit2 更稳，能复用系统代理与证书）
[net]
git-fetch-with-cli = true
